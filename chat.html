<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a2b4a">
  <title>サポートチャット | makes-momo</title>
  <style>
    :root {
      --mm-primary: #1a2b4a;
      --mm-accent: #2e4a7a;
      --mm-light: #e8edf5;
      --mm-text: #1a2b4a;
      --mm-muted: rgba(26, 43, 74, 0.62);
      --mm-border: #c5d0e3;
      --mm-white: #ffffff;
      --mm-radius: 12px;
      --mm-shadow: 0 4px 20px rgba(26, 43, 74, 0.1);
      --cta-h: 52px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--mm-text);
      background: linear-gradient(165deg, var(--mm-light) 0%, #f2f5fa 45%, #e8edf5 100%);
      line-height: 1.55;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1rem;
      padding-top: calc(0.65rem + env(safe-area-inset-top, 0px));
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--mm-border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--mm-accent), var(--mm-primary));
      color: var(--mm-white);
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .app-header-text h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--mm-primary);
    }

    .app-header-text p {
      margin: 0.1rem 0 0;
      font-size: 0.72rem;
      color: var(--mm-muted);
    }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 1rem calc(var(--cta-h) + 1.25rem + var(--safe-bottom));
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .msg {
      display: flex;
      margin-bottom: 0.85rem;
      align-items: flex-end;
      gap: 0.45rem;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg--ai { justify-content: flex-start; }
    .msg--user { justify-content: flex-end; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--mm-light);
      border: 1px solid var(--mm-border);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--mm-primary);
    }

    .msg--user .msg-avatar { display: none; }

    .bubble {
      max-width: min(82%, 420px);
      padding: 0.65rem 0.85rem;
      border-radius: 16px;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(26, 43, 74, 0.08);
    }

    .msg--ai .bubble {
      background: var(--mm-white);
      border: 1px solid var(--mm-border);
      border-bottom-left-radius: 4px;
      color: var(--mm-text);
    }

    .msg--user .bubble {
      background: linear-gradient(180deg, var(--mm-accent) 0%, var(--mm-primary) 100%);
      color: var(--mm-white);
      border-bottom-right-radius: 4px;
    }

    .time {
      font-size: 0.65rem;
      color: var(--mm-muted);
      margin-top: 0.2rem;
      padding: 0 0.15rem;
    }

    .msg--user .time { text-align: right; }

    .composer-wrap {
      flex-shrink: 0;
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(var(--cta-h) + var(--safe-bottom));
      z-index: 9;
      padding: 0.5rem 0.75rem 0.65rem;
      background: linear-gradient(to top, rgba(232, 237, 245, 0.98) 70%, transparent);
      pointer-events: none;
    }

    .composer {
      pointer-events: auto;
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      background: var(--mm-white);
      border: 1px solid var(--mm-border);
      border-radius: 22px;
      padding: 0.35rem 0.35rem 0.35rem 0.85rem;
      box-shadow: var(--mm-shadow);
    }

    .composer:focus-within {
      border-color: var(--mm-accent);
      box-shadow: 0 0 0 3px rgba(46, 74, 122, 0.18);
    }

    .composer textarea {
      flex: 1;
      border: none;
      resize: none;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.45;
      min-height: 2.5rem;
      max-height: 120px;
      padding: 0.45rem 0;
      background: transparent;
      color: var(--mm-text);
    }

    .composer textarea:focus { outline: none; }
    .composer textarea::placeholder { color: rgba(26, 43, 74, 0.45); }

    .btn-send {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--mm-primary);
      color: var(--mm-white);
      display: grid;
      place-items: center;
      box-shadow: 0 2px 10px rgba(26, 43, 74, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    }

    .btn-send:hover:not(:disabled) {
      transform: scale(1.04);
      background: var(--mm-accent);
    }

    .btn-send:active { transform: scale(0.98); }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-send svg { width: 20px; height: 20px; }

    .cta-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 11;
      padding: 0.5rem 1rem calc(0.55rem + var(--safe-bottom));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--mm-border);
      backdrop-filter: blur(8px);
    }

    .cta-bar-inner {
      max-width: 640px;
      margin: 0 auto;
    }

    .btn-yoyaku {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--mm-white);
      text-decoration: none;
      background: var(--mm-primary);
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(26, 43, 74, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    }

    .btn-yoyaku:hover {
      transform: translateY(-1px);
      background: var(--mm-accent);
      box-shadow: 0 4px 16px rgba(26, 43, 74, 0.4);
    }

    .btn-yoyaku:active { transform: translateY(0); }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 0.35rem 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--mm-accent);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-avatar" aria-hidden="true">MM</div>
    <div class="app-header-text">
      <h1>MakesMOMO サポート</h1>
      <p>人事・総務担当者様向け（導入相談・導入後サポート）</p>
    </div>
  </header>

  <div class="chat-scroll" id="chatScroll" role="log" aria-live="polite" aria-relevant="additions" aria-label="チャットメッセージ"></div>

  <div class="composer-wrap">
    <form class="composer" id="chatForm" aria-label="メッセージ入力">
      <textarea
        id="inputMsg"
        rows="1"
        maxlength="2000"
        placeholder="メッセージを入力…"
        autocomplete="off"
        enterkeyhint="send"
      ></textarea>
      <button type="submit" class="btn-send" id="btnSend" aria-label="送信">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 2L11 13" />
          <path d="M22 2L15 22L11 13L2 9L22 2Z" />
        </svg>
      </button>
    </form>
  </div>

  <div class="cta-bar">
    <div class="cta-bar-inner">
      <a class="btn-yoyaku" href="./yoyaku.html">ご予約はこちら</a>
    </div>
  </div>

  <script>
    (function () {
      var CHAT_URL = "/.netlify/functions/chat";
      var OPENING =
        "こんにちは！makes-momoサポートです。\n導入のご相談・ご不明な点など、お気軽にどうぞ😊";

      var chatScroll = document.getElementById("chatScroll");
      var form = document.getElementById("chatForm");
      var input = document.getElementById("inputMsg");
      var btnSend = document.getElementById("btnSend");

      /** Claude API 用（成功した user/assistant のみ） */
      var conversation = [];

      function pad2(n) {
        return n < 10 ? "0" + n : String(n);
      }

      function nowTimeStr() {
        var d = new Date();
        return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
      }

      function appendMessage(role, text) {
        var wrap = document.createElement("div");
        wrap.className = "msg msg--" + role;

        if (role === "ai") {
          var av = document.createElement("div");
          av.className = "msg-avatar";
          av.setAttribute("aria-hidden", "true");
          av.textContent = "AI";
          wrap.appendChild(av);
        }

        var col = document.createElement("div");
        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        col.appendChild(bubble);
        var t = document.createElement("div");
        t.className = "time";
        t.textContent = nowTimeStr();
        col.appendChild(t);
        wrap.appendChild(col);

        chatScroll.appendChild(wrap);
        chatScroll.scrollTop = chatScroll.scrollHeight;
      }

      function showTyping() {
        var wrap = document.createElement("div");
        wrap.className = "msg msg--ai";
        wrap.id = "typingRow";
        var av = document.createElement("div");
        av.className = "msg-avatar";
        av.setAttribute("aria-hidden", "true");
        av.textContent = "AI";
        wrap.appendChild(av);
        var col = document.createElement("div");
        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.setAttribute("aria-hidden", "true");
        var typing = document.createElement("div");
        typing.className = "typing";
        typing.innerHTML = "<span></span><span></span><span></span>";
        bubble.appendChild(typing);
        col.appendChild(bubble);
        wrap.appendChild(col);
        chatScroll.appendChild(wrap);
        chatScroll.scrollTop = chatScroll.scrollHeight;
      }

      function removeTyping() {
        var el = document.getElementById("typingRow");
        if (el) el.remove();
      }

      function removeLastUserMessageEl() {
        var msgs = chatScroll.querySelectorAll(".msg--user");
        if (!msgs.length) return;
        msgs[msgs.length - 1].remove();
      }

      function autosize() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 120) + "px";
      }

      function sendToApi(userText) {
        conversation.push({ role: "user", content: userText });
        showTyping();
        btnSend.disabled = true;
        input.disabled = true;

        fetch(CHAT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversation }),
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { res: res, data: data };
            });
          })
          .then(function (_ref) {
            var res = _ref.res;
            var data = _ref.data;
            removeTyping();
            if (!res.ok) {
              throw new Error(data.error || "リクエストに失敗しました");
            }
            var reply = typeof data.content === "string" ? data.content : "";
            conversation.push({ role: "assistant", content: reply });
            appendMessage("ai", reply);
          })
          .catch(function (err) {
            console.error(err);
            removeTyping();
            conversation.pop();
            removeLastUserMessageEl();
            appendMessage(
              "ai",
              "申し訳ございません。一時的に応答できませんでした。\nしばらくしてから再度お試しください。"
            );
            input.value = userText;
            autosize();
          })
          .finally(function () {
            btnSend.disabled = false;
            input.disabled = false;
            input.focus();
          });
      }

      appendMessage("ai", OPENING);

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.replace(/^\s+|\s+$/g, "");
        if (!text || btnSend.disabled) return;
        appendMessage("user", text);
        input.value = "";
        input.style.height = "auto";
        sendToApi(text);
      });

      input.addEventListener("input", autosize);

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });
    })();
  </script>
</body>
</html>
